name: doc
title: Doc
requires: [document, config, events]

config:
  grammar_proofreader_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Enable AI grammar checker (Writer)
    helper: "When on, WriterAgent registers its AI grammar proofreader with Linguistic; checked text uses your API (Tools → Options → AI). Underlines appear shortly after you pause typing. Off by default."

  grammar_proofreader_wait_timeout_ms:
    type: int
    default: 15000
    min: 0
    max: 60000
    widget: number
    label: Grammar check wait timeout (ms)
    helper: "Reserved for possible future use. The proofreader returns immediately on cache miss (async); results appear on a later Writer pass once the sentence cache is filled."

  grammar_proofreader_model:
    type: string
    default: ""
    widget: text
    label: Grammar check model (optional)
    helper: "Leave empty to use the same text model as chat."

  grammar_proofreader_pause_during_agent:
    type: boolean
    default: false
    widget: checkbox
    label: Pause grammar while chat/agent runs
    helper: "When on, AI grammar skips background requests while sidebar chat or agent runs, to avoid concurrent API calls."

  grammar_proofreader_force_single_sentence:
    type: boolean
    default: true
    widget: checkbox
    label: Force single sentence (disable batching)
    helper: "When on, each sentence is sent in its own independent LLM request. This is slower and more expensive but much more reliable for models with heavy reasoning overhead."

  chat_enter_key_sends_message:
    type: boolean
    default: true
    widget: checkbox
    label: Enter key sends sidebar chat message
    helper: "When on, Enter in the sidebar query runs the same action as Send; Shift+Enter inserts a newline. When off, Enter inserts a newline."
