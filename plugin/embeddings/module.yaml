name: embeddings
title: Embeddings
requires: [config]
config:
  embeddings_cache_enabled:
    type: boolean
    default: false
    widget: checkbox
    label: Embeddings cache (per-folder semantic search)
    width: 400
    helper: "When on, builds a semantic index in writeragent_embeddings/ beside the active document's folder. document_research uses search_embeddings instead of grep_nearby_files. Requires Python venv with sentence-transformers."

  embedding_provider:
    type: string
    default: local
    widget: select
    label: Embedding Provider
    helper: "local (sentence-transformers in venv) or endpoint (configured remote/local endpoint)"
    options:
      - value: local
        label: "Local (venv)"
      - value: endpoint
        label: "Endpoint"
  embedding_model:
    type: string
    default: "all-MiniLM-L6-v2"
    widget: text
    label: Embedding Model
    helper: "HuggingFace model ID for local provider, or endpoint-specific model ID"
